spring.application.name=backend

# Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/shopsphere}
spring.datasource.username=${DATABASE_USERNAME:shopsphere_user}
spring.datasource.password=${DATABASE_PASSWORD:shopsphere123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:shopsphere_super_secret_key_minimum_256_bits_long_string_here_abc123}
jwt.expiration=86400000

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.address=0.0.0.0
server.port=${PORT:8080}